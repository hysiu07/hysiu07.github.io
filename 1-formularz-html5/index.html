<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Zapisz się na szkolenie!</h1>
    <form action="https://formspree.io/f/xlekdbej" method="POST">
        <label for="name">Imię:</label>
        <input type="text" name="name" id="name" placeholder="Tutaj wpisz swoje imię"><br><br>
        <label for="lastname">Nazwisko:</label>
        <input type="text" name="lastname" id="lastname" placeholder="Tutaj wpisz swoje nazwisko"><br><br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email" placeholder="Tutaj wpisz swój e-mail"><br>
        <br>
        <label for="phone">Podaj numer telefonu:</label>
        <input type="number" name="phone" id="phone" placeholder="Tutaj podaj numer telefonu"><br>
        <br>
        <label for="city">Wybierz miasto:</label>
        <select name="city" id="city">
            <option value="Warszawa">Warszawa</option>
            <option value="Poznań">Poznań</option>
            <option value="Kopydłowo">Kopydłowo</option>
            <option value="Pacanowo">Pacanowo</option>
            <option value="Kraków" disabled>Kraków</option>
        </select>
        <br>
        <br>
        <!-- <label for="male female">Wybierz płeć:</label><br> -->
        <p>Wybierz płeć:</p>
        <label for="male">Mężczyzna</label>
        <input type="radio" name="sex" id="male">
        <label for="female">Kobieta</label>
        <input type="radio" name="sex" id="female">
        <br>
        <br>
        <label for="checkbox">Wyrażam zgode na przetwarzanie moich danych osobowych:</label>
        <input type="checkbox" id="checkbox">
        <br><br>

        <label for="message">Wiadomość do organizatora:</label><br>
        <textarea name="message" id="message"></textarea>
        <br>
        <br>

        <input type="submit" value="Wyślij!">



    </form>

</body>

</html>
